name: ReleaseBuild

on:
  push:
    branches:
      - master

env:
  SOLUTION_FILE_PATH: Project/AOENGINE.slnx
  CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Build
        run: |
          msbuild "${{ env.SOLUTION_FILE_PATH }}" /m /p:Platform=x64 /p:Configuration=${{ env.CONFIGURATION }}
